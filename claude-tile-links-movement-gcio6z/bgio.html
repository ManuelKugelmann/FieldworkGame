<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expedition: Verdant Prime — bgio player frontend + Debug Inspector</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0; padding: .3rem 1.25rem 1.25rem;
        background: #0b0f0a; color: #d6e4d0; border-top: 3px solid #2f9aa8;   /* teal = bgio player frontend + inspector */
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      h1 { font-size: .92rem; font-weight: 600; margin: 0; display: inline-block; }
      .badge { font-size: .56rem; text-transform: uppercase; letter-spacing: .08em; padding: .1rem .35rem; border-radius: 3px; vertical-align: middle; margin-left: .4rem; background: #123034; color: #6fd3df; border: 1px solid #1f5a62; }
      .actions-mobile { display: none; }   /* on mobile, actions render directly under the board instead of in the side panel */
      .sub { color: #6f8f70; font-size: .72rem; margin: .15rem 0 .5rem; }
      a { color: #7ad07a; }
      button {
        background: #16301a; color: #cfe9c8; border: 1px solid #2f5a34;
        padding: .35rem .7rem; border-radius: 4px; cursor: pointer; font: inherit; font-size: .8rem;
      }
      button:hover { background: #1d3d22; }
      .cols { display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: flex-start; justify-content: center; }
      @media (min-width: 820px) {
        .cols { flex-wrap: nowrap; }                 /* keep the stats beside the field, not wrapped below */
        body { padding-right: calc(1.5rem + 300px); } /* reserve the right strip for the fixed Debug inspector so nothing hides under it */
      }
      .boardwrap { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; align-items: center; }
      .inspectwrap { width: 100%; max-width: 30rem; margin-top: .45rem; }
      .bar-right { margin-left: auto; display: flex; gap: .4rem; flex-wrap: wrap; }   /* helilift + End turn pinned to the right */
      canvas { background: #0b0f0a; border: 1px solid #1d3d22; border-radius: 6px; touch-action: none; display: block; margin: 0 auto; }
      .side { flex: 0 1 24rem; min-width: 16rem; max-width: 24rem; }
      .panel { margin-bottom: 1rem; }
      .panel h2 { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: #6f8f70; margin: 0 0 .4rem; }
      .bar { display: flex; flex-wrap: wrap; gap: .4rem; }
      .pcard { font-size: .78rem; padding: .35rem .5rem; border: 1px solid #1d3d22; border-radius: 5px; margin-bottom: .35rem; }
      .pcard.cur { border-color: #c9b14a; background: #161306; }
      .who { font-weight: 600; }
      .chip { display: inline-block; padding: 0 .35rem; border-radius: 3px; background: #16301a; margin: 0 .15rem; font-size: .72rem; }
      .pool { font-size: .72rem; color: #9fc69a; }
      #inspect { font-size: .76rem; color: #9fc69a; min-height: 1.2rem; }
      pre { line-height: 1.15; margin: 0; }
      .log { max-height: 28vh; overflow: auto; font-size: .72rem; color: #9fc69a; }
      .legend { color: #6f8f70; font-size: .72rem; margin-top: .6rem; white-space: pre; }
      .status { font-size: .82rem; color: #cfe9c8; margin-bottom: .6rem; }
      .controls { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; margin-bottom: .35rem; }
      .controls button { padding: .22rem .55rem; font-size: .72rem; }
      .turnline { font-size: .76rem; color: #cfe9c8; }
      .built { font-size: .6rem; color: #4f6f50; margin-left: auto; }
      .actions-board { margin-top: .5rem; justify-content: center; }
      .inspectline { width: 100%; max-width: 32rem; font-size: .72rem; color: #9fc69a; margin-top: .4rem; }
      .pcard { line-height: 1.5; }
      @media (min-width: 820px) { .actions-desktop { display: block; } }
      @media (max-width: 819px) { .actions-mobile { display: block; } .actions-desktop { display: none; } }
      .toasts { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: .35rem; align-items: center; z-index: 50; pointer-events: none; }
      .toast { padding: .4rem .8rem; border-radius: 6px; font-size: .8rem; border: 1px solid #2f5a34; background: #16301a; color: #cfe9c8; box-shadow: 0 2px 10px rgba(0,0,0,.55); animation: toastIn .15s ease-out; }
      .toast.good { border-color: #3a7a3f; background: #14301a; color: #bdebbd; }
      .toast.bad { border-color: #8a4040; background: #311414; color: #ecbcbc; }
      .toast.info { border-color: #3f5f86; background: #14202f; color: #bcd2ec; }
      @keyframes toastIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
    </style>
    <script type="module" crossorigin src="/FieldworkGame/claude-tile-links-movement-gcio6z/assets/bgio-CQpIgCVy.js"></script>
    <link rel="modulepreload" crossorigin href="/FieldworkGame/claude-tile-links-movement-gcio6z/assets/render-BEkm44-F.js">
  </head>

    <div id="root"></div>
  </body>
</html>
